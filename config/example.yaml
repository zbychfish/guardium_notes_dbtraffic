# =============================================================================
# guardium-notes-dbtraffic - example configuration
# Use this file as a template. Copy and adjust for your environment.
# Admin user (with full privileges) is required for:
#   deploy-schema, seed-data, cleanup-schema, rebuild
# =============================================================================

# -----------------------------------------------------------------------------
# PostgreSQL
# -----------------------------------------------------------------------------
database:
  type: postgres
  host: 127.0.0.1
  port: 5432
  database: postgres
  user: postgres
  password: postgres

# -----------------------------------------------------------------------------
# Oracle (uncomment to use)
# -----------------------------------------------------------------------------
# database:
#   type: oracle
#   host: 127.0.0.1
#   port: 1521
#   database: ORCLPDB1        # service name
#   user: sys
#   password: oracle

# -----------------------------------------------------------------------------
# Informix (uncomment to use)
# -----------------------------------------------------------------------------
# database:
#   type: informix
#   host: 127.0.0.1
#   port: 9088
#   server: ifxserver         # INFORMIXSERVER – instance name from sqlhosts
#   database: sysmaster       # database name
#   user: informix
#   password: informix

# -----------------------------------------------------------------------------
# Workload settings
# -----------------------------------------------------------------------------
workload:
  duration_seconds: 3600  # 60 minutes (used if --duration not specified)
  think_time_ms: 250      # normal speed (used if --speed not specified)

# -----------------------------------------------------------------------------
# Scenario settings
# -----------------------------------------------------------------------------
scenario:
  name: micro_payments
  options:
    locale: pl_PL           # faker locale for generated data (e.g. en_US, pl_PL, de_DE)
    seed_customers: 100     # number of customers inserted during seed-data
    app_users:
      - appuser1
      - appuser2
    admin_users:
      - adminuser1
    default_password: password
    # jdbc_jar: /path/to/ifxjdbc.jar:/path/to/bson.jar  # required for informix (colon-separated jars)

